<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#1c1c22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#C8A85A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C8A85A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#glow)"/>
  <!-- Substitution alphabet grid -->
  <g font-family="monospace" font-size="18" fill="#C9A84C" opacity="0.12" text-anchor="middle">
    <text x="600" y="120">A B C D E F G H I J K L M</text>
    <text x="600" y="150">N O P Q R S T U V W X Y Z</text>
  </g>
  <g font-family="monospace" font-size="18" fill="#C9A84C" opacity="0.08" text-anchor="middle">
    <text x="600" y="250">Q W E R T Y U I O P A S D</text>
    <text x="600" y="280">F G H J K L Z X C V B N M</text>
  </g>
  <!-- Connecting arrows -->
  <g stroke="#C9A84C" stroke-width="0.6" opacity="0.07">
    <line x1="480" y1="160" x2="520" y2="240"/>
    <line x1="530" y1="160" x2="560" y2="240"/>
    <line x1="580" y1="160" x2="610" y2="240"/>
    <line x1="630" y1="160" x2="640" y2="240"/>
    <line x1="680" y1="160" x2="590" y2="240"/>
    <line x1="730" y1="160" x2="700" y2="240"/>
  </g>
  <!-- Frame lines -->
  <rect x="60" y="30" width="1080" height="340" rx="8" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.06"/>
  <rect x="80" y="50" width="1040" height="300" rx="6" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.04"/>
  <!-- Corner ornaments -->
  <circle cx="60" cy="30" r="3" fill="#C9A84C" opacity="0.1"/>
  <circle cx="1140" cy="30" r="3" fill="#C9A84C" opacity="0.1"/>
  <circle cx="60" cy="370" r="3" fill="#C9A84C" opacity="0.1"/>
  <circle cx="1140" cy="370" r="3" fill="#C9A84C" opacity="0.1"/>
</svg>
